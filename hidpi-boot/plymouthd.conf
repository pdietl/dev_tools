# Administrator customizations go in this file
#
# DeviceScale=2: render the boot splash and the disk-decryption prompt at
# 200% on the 3840x2400 panel (~260 DPI); unscaled they are unreadably
# small. Plymouth has no reliable HiDPI autodetection at initramfs time.
# Revert: remove the [Daemon] section below, then run update-initramfs -u.
[Daemon]
DeviceScale=2
