# Larger GRUB font for the 3840x2400 HiDPI panel. The boot GOP framebuffer
# runs at native resolution (NVIDIA GOP in BIOS Discrete mode; same panel in
# Hybrid), where the default 16 px unicode.pf2 is unreadably small at ~260 DPI.
# Font generated with:
#   grub-mkfont -s 32 -o /boot/grub/fonts/DejaVuSansMono-32.pf2 \
#       /usr/share/fonts/truetype/dejavu/DejaVuSansMono.ttf
# Revert: delete this file and /boot/grub/fonts/DejaVuSansMono-32.pf2,
# then run update-grub.
GRUB_FONT=/boot/grub/fonts/DejaVuSansMono-32.pf2
