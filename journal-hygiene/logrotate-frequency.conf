# Run logrotate hourly instead of the packaged daily schedule, so the
# size caps in /etc/logrotate.d/{tailscaled,slack,localsearch} are
# enforced with at most ~1 hour of overshoot instead of ~24 hours.
# Revert: delete this file and `systemctl daemon-reload`.
[Timer]
OnCalendar=
OnCalendar=hourly
AccuracySec=1m
