# Redirect LocalSearch (GNOME file indexer) output to its own log file
# instead of the journal: crawling emits steady GLib assertion noise
# (e.g. "GFileInfo created without standard::type" from FUSE mounts that
# serve incomplete GIO metadata). The target directory must already
# exist (provision creates it): systemd wires up stdout before it would
# provision LogsDirectory=, so append: into a not-yet-created directory
# fails the unit.
# Size-capped rotation lives in /etc/logrotate.d/localsearch.
# Revert: delete this file, then `systemctl --user daemon-reload &&
# systemctl --user restart localsearch-3`.
[Service]
StandardOutput=append:%h/.local/state/localsearch/localsearch.log
StandardError=append:%h/.local/state/localsearch/localsearch.log
