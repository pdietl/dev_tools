# Redirect tailscaled output to its own log file instead of the journal.
# tailscaled emits a steady stream of disco-key/NetInfo/portUpdate chatter,
# and floods with connection-retry noise whenever the machine is offline.
# Size-capped rotation lives in /etc/logrotate.d/tailscaled.
# Revert: delete this file, then `systemctl daemon-reload &&
# systemctl restart tailscaled`.
[Service]
StandardOutput=append:/var/log/tailscaled.log
StandardError=append:/var/log/tailscaled.log
