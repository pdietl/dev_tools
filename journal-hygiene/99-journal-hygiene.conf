# Journald sizing + flood backstop (modeled on the terrafirma Jetson's
# journald drop-in). Raise the persistent-journal ceiling well above the
# 4G default: with the chatty desktop loggers redirected to their own
# files (see journal-hygiene/ in dev_tools), journal growth is slow, so
# this buys months-to-years of retention on machines with disk to spare.
#
# SystemMaxFileSize must be >= SystemMaxUse / SystemMaxFiles (default
# 100 files), or the file-count cap silently lowers the effective size
# cap; 256M x 100 > 20G, and small files keep vacuuming granular.
#
# The rate limit applies per SYSLOG_IDENTIFIER / unit, so well-behaved
# services are unaffected; it only truncates pathological flooders.
#
# Revert: delete this file and `systemctl restart systemd-journald`.
[Journal]
Storage=persistent
SystemMaxUse=20G
SystemMaxFileSize=256M
RateLimitIntervalSec=10s
RateLimitBurst=1000
