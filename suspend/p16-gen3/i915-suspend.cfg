# ThinkPad P16 Gen 3: the Arrow Lake-HX i915 C10 PHY/PLL fails to restore
# after deep display power states, hanging the GUI on resume (backlight on,
# no frames ever drawn). Disable PSR, display C-states, and power-well
# gating so the PHY never enters the states it cannot reliably leave.
# Costs roughly 1-2 W at idle. See thinkpad-p16-gen3-ubuntu-suspend.md
# (failure mode 3) in dev_tools.
# Revert: delete this file and run update-grub.
GRUB_CMDLINE_LINUX_DEFAULT="$GRUB_CMDLINE_LINUX_DEFAULT i915.enable_psr=0 i915.enable_dc=0 i915.disable_power_well=0"
